<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>For Helena</title>
    <meta name="description" content="A romantic surprise website made with love." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg: linear-gradient(180deg, #fff1f4 0%, #ffeef8 45%, #ffffff 100%);
        --bg-night: #09090f;
        --text: #1f2937;
        --text-soft: #5b6472;
        --text-night: #f9fafb;
        --text-soft-night: #cbd5e1;
        --card: rgba(255,255,255,0.75);
        --card-night: rgba(255,255,255,0.08);
        --border: rgba(255,255,255,0.5);
        --border-night: rgba(255,255,255,0.12);
        --pink: #ec4899;
        --pink-dark: #db2777;
        --soft: #fff7fb;
        --shadow: 0 20px 50px rgba(236, 72, 153, 0.12);
      }
      * { box-sizing: border-box; }
      html { scroll-behavior: smooth; }
      body {
        margin: 0;
        font-family: 'Inter', sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      body.night {
        background: var(--bg-night);
        color: var(--text-night);
      }
      button, input, textarea { font: inherit; }
      .container {
        width: min(1120px, calc(100% - 32px));
        margin: 0 auto;
      }
    </style>
    <script type="module" src="/src/main.jsx"></script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
